syntax = "proto3";

package delivery;

// --- gRPC service for Delivery Hub ---
service DeliveryHub {
    // Robot sends a delivery request
    rpc SendDelivery(DeliveryRequest) returns (DeliveryResponse);

    // Robot subscribes to hub events (slot updates, acknowledgements)
    rpc SubscribeEvents(EventSubscriptionRequest) returns (stream HubEvent);
}

// --- Messages ---

// Request sent by a robot to deliver a package
message DeliveryRequest {
    int32 robot_id = 1;
    int32 package_id = 2;
}

// Response from hub when a delivery request is processed
message DeliveryResponse {
    bool success = 1;
    string message = 2; // e.g., "accepted", "full", "error"
}

// Request to subscribe to hub events (can be empty)
message EventSubscriptionRequest {}

// Event broadcasted by hub to robots
message HubEvent {
    int32 robot_id = 1;        // the robot concerned (optional: 0 if general)
    int32 package_id = 2;      // relevant package ID
    string event_type = 3;     // "accepted", "full", "freed", etc.
    int32 slots_used = 4;      // current used slots
    int32 total_slots = 5;     // total available slots
}
